name: Release

# Triggers when you push a version tag, e.g. git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
            exe: dist/TwitchBoxingRing.exe
          - os: macos-latest
            platform: mac
            exe: dist/TwitchBoxingRing

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: python -m PyInstaller --clean --noconfirm TwitchBoxingRing.spec

      - name: Verify executable exists
        shell: bash
        run: |
          if [ ! -f "${{ matrix.exe }}" ]; then
            echo "ERROR: Expected executable not found at ${{ matrix.exe }}"
            exit 1
          fi
          echo "Executable size: $(du -sh ${{ matrix.exe }} | cut -f1)"

      - name: Assemble release zip
        shell: bash
        run: |
          FOLDER="TwitchBoxingRing-${{ matrix.platform }}"
          ZIP="dist/${FOLDER}.zip"

          mkdir -p "${FOLDER}/configs"

          # Executable
          cp "${{ matrix.exe }}" "${FOLDER}/"

          # User-editable files
          cp config.py             "${FOLDER}/"
          cp configs/typechart.json "${FOLDER}/configs/"
          cp configs/movepool.json   "${FOLDER}/configs/"
          cp web/overlay.html      "${FOLDER}/"
          cp web/overlay.css       "${FOLDER}/"
          cp web/overlay.js        "${FOLDER}/"
          cp README.md             "${FOLDER}/"

          # Zip it up
          if [ "${{ matrix.platform }}" = "windows" ]; then
            7z a "${ZIP}" "${FOLDER}/"
          else
            zip -r "${ZIP}" "${FOLDER}/"
          fi

          echo "ZIP_PATH=${ZIP}" >> $GITHUB_ENV
          echo "ZIP_NAME=${FOLDER}.zip" >> $GITHUB_ENV

      - name: Upload zip as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: TwitchBoxingRing-${{ matrix.platform }}
          path: ${{ env.ZIP_PATH }}
          retention-days: 7

  release:
    # Only runs after both platform builds succeed
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows zip
        uses: actions/download-artifact@v4
        with:
          name: TwitchBoxingRing-windows
          path: dist/

      - name: Download Mac zip
        uses: actions/download-artifact@v4
        with:
          name: TwitchBoxingRing-mac
          path: dist/

      - name: Create GitHub Release and attach zips
        uses: softprops/action-gh-release@v2
        with:
          name: Twitch Boxing Ring ${{ github.ref_name }}
          body: |
            ## Twitch Boxing Ring ${{ github.ref_name }}

            ### Download
            | Platform | File |
            |---|---|
            | Windows | `TwitchBoxingRing-windows.zip` |
            | macOS   | `TwitchBoxingRing-mac.zip`     |

            ### First-time setup
            1. Extract the zip
            2. Fill in your details in `config.py`
            3. Run `TwitchBoxingRing` (double-click or terminal)
            4. Follow the Twitch authorization prompt in the terminal
            5. Add `overlay.html` as a Browser Source in OBS (1920×1080)

            See `README.md` inside the zip for full instructions.
          files: |
            dist/TwitchBoxingRing-windows.zip
            dist/TwitchBoxingRing-mac.zip
          draft: false
          prerelease: false