<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Boxing Ring Overlay</title>
  <link rel="stylesheet" href="overlay.css" />
</head>
<body>

<!-- IDLE / WAITING SCREEN -->
<div id="idle">
  <div class="logo">🥊 BOXING RING</div>
  <div class="sub">Redeem channel points to enter</div>
  <div class="queue-display" id="idle-queue">Waiting for fighters…</div>
</div>

<!-- FIGHT SCREEN -->
<div id="fight">
  <div class="rope rope-1"></div>
  <div class="rope rope-2"></div>
  <div class="rope rope-3"></div>
  <div class="rope rope-4"></div>

  <!-- Fighter 1 (left / red) -->
  <div class="fighter-panel left" id="panel1">
    <div class="fighter-name" id="name1">—</div>
    <div class="fighter-meta">
      <div class="type-badge" id="type1">?</div>
    </div>
    <div class="hp-wrap">
      <div class="hp-label"><span id="hp1-val">—</span> / <span id="hp1-max">—</span> HP</div>
      <div class="hp-bar-bg"><div class="hp-bar-fill" id="hp1-bar" style="width:100%"></div></div>
    </div>
    <div class="moves-list" id="moves1"></div>
  </div>

  <!-- Centre HUD -->
  <div id="centre-hud">
    <div id="round-label">ROUND 1</div>
    <div id="timer-ring">
      <svg id="timer-svg" width="120" height="120" viewBox="0 0 120 120">
        <circle id="timer-track" cx="60" cy="60" r="50"/>
        <circle id="timer-arc"   cx="60" cy="60" r="50"/>
      </svg>
      <div id="timer-text">—</div>
    </div>
  </div>

  <!-- Fighter 2 (right / blue) -->
  <div class="fighter-panel right" id="panel2">
    <div class="fighter-name" id="name2">—</div>
    <div class="fighter-meta">
      <div class="type-badge" id="type2">?</div>
    </div>
    <div class="hp-wrap">
      <div class="hp-label"><span id="hp2-val">—</span> / <span id="hp2-max">—</span> HP</div>
      <div class="hp-bar-bg"><div class="hp-bar-fill" id="hp2-bar" style="width:100%"></div></div>
    </div>
    <div class="moves-list" id="moves2"></div>
  </div>

  <!-- Avatar portraits (Pokémon-style, centre-bottom) -->
  <div class="avatar-wrap left" id="avatar-wrap1">
    <div class="avatar-ring" id="avatar-ring1"></div>
    <img class="avatar-img" id="avatar1" src="" alt="" />
    <div class="avatar-platform"></div>
  </div>
  <div class="avatar-wrap right" id="avatar-wrap2">
    <div class="avatar-ring" id="avatar-ring2"></div>
    <img class="avatar-img" id="avatar2" src="" alt="" />
    <div class="avatar-platform"></div>
  </div>

  <!-- Announcement banner -->
  <div id="announcement"></div>

  <!-- Effectiveness flash -->
  <div id="eff-flash"></div>

  <!-- VS splash -->
  <div id="vs-splash"><div class="vs-text">VS</div></div>

  <!-- Winner splash -->
  <div id="winner-splash">
    <div class="ko-text">K.O.!</div>
    <div class="winner-name" id="winner-name">—</div>
    <div class="winner-sub">WINS THE MATCH!</div>
  </div>
</div>

<script src="overlay.js"></script>
</body>
</html>
