<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Boxing Ring Overlay</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Boogaloo&family=Black+Ops+One&family=Share+Tech+Mono&display=swap');

  :root {
    --clr-bg:        transparent;
    --clr-ring:      #0d0d0d;
    --clr-canvas:    #111318;
    --clr-gold:      #f5c400;
    --clr-red:       #e63946;
    --clr-blue:      #457bff;
    --clr-white:     #f0ece2;
    --clr-muted:     #6b6b7e;
    --clr-panel:     rgba(15,15,20,0.92);

    /* type badge colours */
    --t-Fire:     #ff6b35; --t-Water:    #3a9bd5; --t-Grass:    #5bba6f;
    --t-Electric: #f5c400; --t-Ice:      #74d7ec; --t-Fighting: #c0392b;
    --t-Poison:   #9b59b6; --t-Ground:   #c8a96e; --t-Flying:   #8ecae6;
    --t-Psychic:  #ff6fa8; --t-Bug:      #8bc34a; --t-Rock:     #a0845c;
    --t-Ghost:    #7c5cbf; --t-Dragon:   #2980b9; --t-Dark:     #34495e;
    --t-Steel:    #90a4ae; --t-Fairy:    #f48fb1; --t-Normal:   #9e9e9e;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 1920px; height: 1080px;
    background: var(--clr-bg);
    font-family: 'Boogaloo', sans-serif;
    overflow: hidden;
    color: var(--clr-white);
  }

  /* ── IDLE SCREEN ── */
  #idle {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 24px;
    background: radial-gradient(ellipse at 50% 60%, #1a1a2e 0%, #0d0d12 100%);
  }
  #idle .logo {
    font-family: 'Black Ops One', sans-serif;
    font-size: 120px;
    letter-spacing: 6px;
    color: var(--clr-gold);
    text-shadow: 0 0 40px rgba(245,196,0,0.5), 4px 4px 0 #7a5f00;
    line-height: 1;
    animation: pulse 2.4s ease-in-out infinite;
  }
  #idle .sub {
    font-size: 38px;
    color: var(--clr-muted);
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  #idle .queue-display {
    margin-top: 16px;
    font-size: 32px;
    color: var(--clr-white);
    text-align: center;
    line-height: 1.6;
  }
  #idle .queue-display span { color: var(--clr-gold); }

  @keyframes pulse {
    0%,100% { text-shadow: 0 0 40px rgba(245,196,0,0.5), 4px 4px 0 #7a5f00; }
    50%      { text-shadow: 0 0 80px rgba(245,196,0,0.9), 4px 4px 0 #7a5f00; }
  }

  /* ── FIGHT SCREEN ── */
  #fight {
    position: absolute; inset: 0;
    display: none;
    background: #0d0d12;
    overflow: hidden;
  }

  /* ring floor pattern */
  #fight::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      repeating-linear-gradient(0deg,   transparent, transparent 59px, rgba(255,255,255,0.03) 60px),
      repeating-linear-gradient(90deg,  transparent, transparent 59px, rgba(255,255,255,0.03) 60px);
    pointer-events: none;
  }

  /* corner ropes */
  .rope {
    position: absolute;
    background: linear-gradient(90deg, #8b0000, #cc0000, #8b0000);
    height: 6px;
    width: 100%;
    border-radius: 4px;
    box-shadow: 0 0 12px rgba(200,0,0,0.5);
  }
  .rope-1 { top: 140px; }
  .rope-2 { top: 200px; }
  .rope-3 { bottom: 140px; }
  .rope-4 { bottom: 200px; }

  /* ── FIGHTER PANELS ── */
  .fighter-panel {
    position: absolute;
    top: 40px;
    width: 560px;
    background: var(--clr-panel);
    border: 2px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 20px 24px;
    backdrop-filter: blur(8px);
  }
  .fighter-panel.left  { left: 40px; }
  .fighter-panel.right { right: 40px; text-align: right; }

  .fighter-name {
    font-family: 'Black Ops One', sans-serif;
    font-size: 42px;
    line-height: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .left  .fighter-name { color: var(--clr-red); }
  .right .fighter-name { color: var(--clr-blue); }

  .fighter-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 6px;
  }
  .right .fighter-meta { flex-direction: row-reverse; }

  .type-badge {
    display: inline-block;
    padding: 3px 12px;
    border-radius: 20px;
    font-size: 18px;
    font-weight: bold;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #000;
  }

  /* HP bar */
  .hp-wrap {
    margin-top: 12px;
  }
  .hp-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 20px;
    color: var(--clr-muted);
    margin-bottom: 4px;
  }
  .hp-bar-bg {
    height: 22px;
    background: rgba(255,255,255,0.08);
    border-radius: 4px;
    overflow: hidden;
  }
  .hp-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.6s ease, background 0.4s;
  }
  .left  .hp-bar-fill { background: var(--clr-red); }
  .right .hp-bar-fill { background: var(--clr-blue); }

  /* Move list */
  .moves-list {
    margin-top: 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .move-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 19px;
    padding: 5px 8px;
    border-radius: 6px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    transition: background 0.25s;
  }
  .right .move-row { flex-direction: row-reverse; }
  .move-num {
    font-family: 'Black Ops One', sans-serif;
    font-size: 22px;
    color: var(--clr-gold);
    min-width: 20px;
    text-align: center;
  }
  .move-type-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .move-name { flex: 1; }
  .move-power {
    font-family: 'Share Tech Mono', monospace;
    font-size: 16px;
    color: var(--clr-muted);
  }
  .move-row.selected {
    background: rgba(245,196,0,0.15);
    border-color: var(--clr-gold);
  }

  /* ── CENTRE HUD ── */
  #centre-hud {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    pointer-events: none;
  }

  #round-label {
    font-family: 'Black Ops One', sans-serif;
    font-size: 52px;
    color: var(--clr-gold);
    letter-spacing: 3px;
    text-shadow: 0 0 24px rgba(245,196,0,0.6);
  }

  #timer-ring {
    position: relative;
    width: 120px; height: 120px;
  }
  #timer-svg { transform: rotate(-90deg); }
  #timer-track { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 10; }
  #timer-arc   { fill: none; stroke: var(--clr-gold);         stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 1s linear, stroke 0.3s; }
  #timer-text {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Black Ops One', sans-serif;
    font-size: 36px;
    color: var(--clr-white);
  }

  /* ── ANNOUNCEMENT BANNER ── */
  #announcement {
    position: absolute;
    bottom: 260px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--clr-gold);
    color: #000;
    font-family: 'Black Ops One', sans-serif;
    font-size: 38px;
    letter-spacing: 2px;
    padding: 14px 48px;
    border-radius: 8px;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    box-shadow: 0 8px 40px rgba(245,196,0,0.4);
    z-index: 20;
    text-align: center;
  }
  #announcement.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── VS SPLASH ── */
  #vs-splash {
    position: absolute; inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.85);
    z-index: 30;
  }
  #vs-splash .vs-text {
    font-family: 'Black Ops One', sans-serif;
    font-size: 200px;
    color: var(--clr-gold);
    text-shadow: 0 0 60px rgba(245,196,0,0.8), 8px 8px 0 #7a5f00;
    animation: vsAnim 0.6s ease-out both;
  }
  @keyframes vsAnim {
    from { transform: scale(3); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  /* ── WINNER SPLASH ── */
  #winner-splash {
    position: absolute; inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    background: rgba(0,0,0,0.9);
    z-index: 30;
  }
  #winner-splash .ko-text {
    font-family: 'Black Ops One', sans-serif;
    font-size: 160px;
    color: var(--clr-red);
    text-shadow: 0 0 60px rgba(230,57,70,0.8), 6px 6px 0 #7a0000;
    animation: koAnim 0.5s ease-out both;
  }
  #winner-splash .winner-name {
    font-family: 'Black Ops One', sans-serif;
    font-size: 72px;
    color: var(--clr-gold);
    animation: fadeUp 0.5s 0.3s ease-out both;
  }
  #winner-splash .winner-sub {
    font-size: 34px;
    color: var(--clr-muted);
    animation: fadeUp 0.5s 0.5s ease-out both;
  }
  @keyframes koAnim  { from { transform: scale(0.3) rotate(-12deg); opacity: 0; } to { transform: scale(1) rotate(0deg); opacity: 1; } }
  @keyframes fadeUp  { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  /* ── EFFECTIVENESS FLASH ── */
  #eff-flash {
    position: absolute;
    left: 50%; top: 38%;
    transform: translateX(-50%);
    font-family: 'Black Ops One', sans-serif;
    font-size: 44px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 25;
    text-align: center;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
  }
  #eff-flash.show { opacity: 1; }

  /* ── AVATAR PORTRAITS ── */
  .avatar-wrap {
    position: absolute;
    bottom: 230px;
    width: 280px;
    height: 280px;
    pointer-events: none;
    z-index: 5;
  }
  .avatar-wrap.left  { left: 580px; }
  .avatar-wrap.right { right: 580px; }

  .avatar-platform {
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 220px; height: 28px;
    background: radial-gradient(ellipse at center, rgba(255,255,255,0.18) 0%, transparent 70%);
    border-radius: 50%;
    filter: blur(2px);
  }

  .avatar-img {
    position: absolute;
    bottom: 18px; left: 50%;
    transform: translateX(-50%);
    width: 240px; height: 240px;
    object-fit: cover;
    border-radius: 50%;
    image-rendering: pixelated;
    filter: drop-shadow(0 8px 32px rgba(0,0,0,0.7));
    transition: filter 0.4s;
  }
  /* Left fighter faces right (normal), right fighter faces left (mirrored) */
  .avatar-wrap.right .avatar-img { transform: translateX(-50%) scaleX(-1); }

  /* Pokémon-style type-coloured glow ring */
  .avatar-ring {
    position: absolute;
    bottom: 14px; left: 50%;
    transform: translateX(-50%);
    width: 248px; height: 248px;
    border-radius: 50%;
    border: 4px solid transparent;
    box-sizing: border-box;
    transition: border-color 0.4s, box-shadow 0.4s;
  }

  /* Slide-in entrance animations */
  @keyframes slideInLeft  { from { transform: translateX(-120px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes slideInRight { from { transform: translateX( 120px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  .avatar-wrap.left  { animation: slideInLeft  0.6s 0.3s cubic-bezier(0.22,1,0.36,1) both; }
  .avatar-wrap.right { animation: slideInRight 0.6s 0.5s cubic-bezier(0.22,1,0.36,1) both; }

  /* KO: greyscale the loser */
  .avatar-img.ko { filter: drop-shadow(0 8px 32px rgba(0,0,0,0.7)) grayscale(1) brightness(0.5); }
</style>
</head>
<body>

<!-- IDLE / WAITING SCREEN -->
<div id="idle">
  <div class="logo">🥊 BOXING RING</div>
  <div class="sub">Redeem channel points to enter</div>
  <div class="queue-display" id="idle-queue">Waiting for fighters…</div>
</div>

<!-- FIGHT SCREEN -->
<div id="fight">
  <div class="rope rope-1"></div>
  <div class="rope rope-2"></div>
  <div class="rope rope-3"></div>
  <div class="rope rope-4"></div>

  <!-- Fighter 1 (left / red) -->
  <div class="fighter-panel left" id="panel1">
    <div class="fighter-name" id="name1">—</div>
    <div class="fighter-meta">
      <div class="type-badge" id="type1">?</div>
    </div>
    <div class="hp-wrap">
      <div class="hp-label"><span id="hp1-val">—</span> / <span id="hp1-max">—</span> HP</div>
      <div class="hp-bar-bg"><div class="hp-bar-fill" id="hp1-bar" style="width:100%"></div></div>
    </div>
    <div class="moves-list" id="moves1"></div>
  </div>

  <!-- Centre HUD -->
  <div id="centre-hud">
    <div id="round-label">ROUND 1</div>
    <div id="timer-ring">
      <svg id="timer-svg" width="120" height="120" viewBox="0 0 120 120">
        <circle id="timer-track" cx="60" cy="60" r="50"/>
        <circle id="timer-arc"   cx="60" cy="60" r="50"/>
      </svg>
      <div id="timer-text">—</div>
    </div>
  </div>

  <!-- Fighter 2 (right / blue) -->
  <div class="fighter-panel right" id="panel2">
    <div class="fighter-name" id="name2">—</div>
    <div class="fighter-meta">
      <div class="type-badge" id="type2">?</div>
    </div>
    <div class="hp-wrap">
      <div class="hp-label"><span id="hp2-val">—</span> / <span id="hp2-max">—</span> HP</div>
      <div class="hp-bar-bg"><div class="hp-bar-fill" id="hp2-bar" style="width:100%"></div></div>
    </div>
    <div class="moves-list" id="moves2"></div>
  </div>

  <!-- Avatar portraits (Pokémon-style, centre-bottom) -->
  <div class="avatar-wrap left" id="avatar-wrap1">
    <div class="avatar-ring" id="avatar-ring1"></div>
    <img class="avatar-img" id="avatar1" src="" alt="" />
    <div class="avatar-platform"></div>
  </div>
  <div class="avatar-wrap right" id="avatar-wrap2">
    <div class="avatar-ring" id="avatar-ring2"></div>
    <img class="avatar-img" id="avatar2" src="" alt="" />
    <div class="avatar-platform"></div>
  </div>

  <!-- Announcement banner -->
  <div id="announcement"></div>

  <!-- Effectiveness flash -->
  <div id="eff-flash"></div>

  <!-- VS splash -->
  <div id="vs-splash"><div class="vs-text">VS</div></div>

  <!-- Winner splash -->
  <div id="winner-splash">
    <div class="ko-text">K.O.!</div>
    <div class="winner-name" id="winner-name">—</div>
    <div class="winner-sub">WINS THE MATCH!</div>
  </div>
</div>

<script>
// ── TYPE COLOURS ──
const TYPE_COLORS = {
  Fire:'#ff6b35',Water:'#3a9bd5',Grass:'#5bba6f',Electric:'#f5c400',
  Ice:'#74d7ec',Fighting:'#c0392b',Poison:'#9b59b6',Ground:'#c8a96e',
  Flying:'#8ecae6',Psychic:'#ff6fa8',Bug:'#8bc34a',Rock:'#a0845c',
  Ghost:'#7c5cbf',Dragon:'#2980b9',Dark:'#34495e',Steel:'#90a4ae',
  Fairy:'#f48fb1',Normal:'#9e9e9e'
};
function typeColor(t) { return TYPE_COLORS[t] || '#888'; }
function contrastColor(hex) {
  // pick black or white text based on luminance
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return (0.299*r+0.587*g+0.114*b) > 150 ? '#000' : '#fff';
}

// ── HELPERS ──
const $ = id => document.getElementById(id);
const circumference = 2 * Math.PI * 50; // r=50
$('timer-arc').style.strokeDasharray = circumference;

let timerInterval = null;
let currentTimer = 0;
let maxTimer = 20;

function setTimer(seconds) {
  clearInterval(timerInterval);
  currentTimer = seconds;
  maxTimer = seconds;
  updateTimerArc();
  timerInterval = setInterval(() => {
    currentTimer--;
    updateTimerArc();
    if (currentTimer <= 0) clearInterval(timerInterval);
  }, 1000);
}

function updateTimerArc() {
  const pct = Math.max(0, currentTimer / maxTimer);
  const offset = circumference * (1 - pct);
  $('timer-arc').style.strokeDashoffset = offset;
  $('timer-text').textContent = currentTimer > 0 ? currentTimer : '—';
  // colour shifts red when low
  $('timer-arc').style.stroke = pct < 0.25 ? '#e63946' : '#f5c400';
}

function setHp(idx, hp, maxHp) {
  const pct = Math.max(0, hp / maxHp * 100);
  $(`hp${idx}-val`).textContent = hp;
  $(`hp${idx}-max`).textContent = maxHp;
  const bar = $(`hp${idx}-bar`);
  bar.style.width = pct + '%';
  if (pct < 25)      bar.style.background = '#e63946';
  else if (pct < 50) bar.style.background = '#f5c400';
  else               bar.style.background = idx === 1 ? '#e63946' : '#457bff';
}

function buildMoves(idx, moves) {
  const list = $(`moves${idx}`);
  list.innerHTML = '';
  moves.forEach((m, i) => {
    const row = document.createElement('div');
    row.className = 'move-row';
    row.id = `move${idx}-${i}`;
    const col = typeColor(m.type);
    row.innerHTML = `
      <span class="move-num">${i+1}</span>
      <span class="move-type-dot" style="background:${col}"></span>
      <span class="move-name">${m.name}</span>
      <span class="move-power">${m.power}pw</span>
    `;
    list.appendChild(row);
  });
}

function setType(idx, type) {
  const el = $(`type${idx}`);
  const col = typeColor(type);
  el.textContent = type.toUpperCase();
  el.style.background = col;
  el.style.color = contrastColor(col);
}

function highlightMove(idx, moveIdx) {
  for (let i=0;i<4;i++) {
    const el = $(`move${idx}-${i}`);
    if (el) el.classList.remove('selected');
  }
  const sel = $(`move${idx}-${moveIdx}`);
  if (sel) sel.classList.add('selected');
}

function showAnnouncement(text, duration=3000) {
  const el = $('announcement');
  el.textContent = text;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

function showEffectiveness(text, color, duration=2000) {
  const el = $('eff-flash');
  el.textContent = text;
  el.style.color = color;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

function updateIdleQueue(queue) {
  if (queue.length === 0) {
    $('idle-queue').innerHTML = 'Waiting for fighters…';
  } else if (queue.length === 1) {
    $('idle-queue').innerHTML = `<span>${queue[0]}</span> is in the ring — waiting for opponent…`;
  } else {
    $('idle-queue').innerHTML = `<span>${queue[0]}</span> vs <span>${queue[1]}</span> — GET READY!`;
  }
}

function showScreen(name) {
  $('idle').style.display = 'none';
  $('fight').style.display = 'none';
  if (name === 'idle') $('idle').style.display = 'flex';
  if (name === 'fight') $('fight').style.display = 'block';
}

// ── WEBSOCKET ──
function connect() {
  const ws = new WebSocket('ws://localhost:8765');

  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    console.log('[WS]', msg.event, msg);
    handleEvent(msg);
  };

  ws.onclose = () => {
    console.warn('WS closed, reconnecting…');
    setTimeout(connect, 2000);
  };
}

function handleEvent(msg) {
  switch(msg.event) {

    case 'queue_update':
      updateIdleQueue(msg.queue);
      break;

    case 'fight_start': {
      const f1 = msg.fighter1, f2 = msg.fighter2;
      // populate panels
      $('name1').textContent = f1.name;
      $('name2').textContent = f2.name;
      setType(1, f1.type);
      setType(2, f2.type);
      setHp(1, f1.hp, f1.max_hp);
      setHp(2, f2.hp, f2.max_hp);
      buildMoves(1, f1.moves);
      buildMoves(2, f2.moves);

      // Set avatars — fall back to a placeholder silhouette if no URL
      const PLACEHOLDER = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="35" r="22" fill="%23555"/><ellipse cx="50" cy="85" rx="32" ry="22" fill="%23555"/></svg>';
      $('avatar1').src = f1.avatar || PLACEHOLDER;
      $('avatar2').src = f2.avatar || PLACEHOLDER;
      $('avatar1').classList.remove('ko');
      $('avatar2').classList.remove('ko');

      // Type-coloured glow ring around each portrait
      const col1 = typeColor(f1.type), col2 = typeColor(f2.type);
      $('avatar-ring1').style.borderColor = col1;
      $('avatar-ring1').style.boxShadow = `0 0 24px 6px ${col1}66, inset 0 0 16px ${col1}33`;
      $('avatar-ring2').style.borderColor = col2;
      $('avatar-ring2').style.boxShadow = `0 0 24px 6px ${col2}66, inset 0 0 16px ${col2}33`;

      // Reset entrance animations by removing and re-adding the elements
      ['avatar-wrap1','avatar-wrap2'].forEach(id => {
        const el = $(id);
        el.style.animation = 'none';
        el.offsetHeight; // force reflow
        el.style.animation = '';
      });

      // hide sub-screens
      $('vs-splash').style.display   = 'none';
      $('winner-splash').style.display = 'none';

      showScreen('fight');

      // VS splash
      const vs = $('vs-splash');
      vs.style.display = 'flex';
      setTimeout(() => vs.style.display = 'none', 2500);
      break;
    }

    case 'round_start':
      $('round-label').textContent = `ROUND ${msg.round}`;
      setTimer(msg.timer);
      // reset move highlights
      for (let i=0;i<4;i++) {
        const a=$(`move1-${i}`), b=$(`move2-${i}`);
        if(a) a.classList.remove('selected');
        if(b) b.classList.remove('selected');
      }
      showAnnouncement(`⚔️  ROUND ${msg.round} — Choose your move! (1–4)`, 3000);
      break;

    case 'round_result': {
      clearInterval(timerInterval);
      const f1 = msg.fighter1, f2 = msg.fighter2;

      // highlight chosen moves
      highlightMove(1, f1.move_used);
      highlightMove(2, f2.move_used);

      // Update HP
      setHp(1, f1.hp, f1.max_hp);
      setHp(2, f2.hp, f2.max_hp);

      // Effectiveness message
      const eff1 = f1.effectiveness, eff2 = f2.effectiveness;
      let effText = '', effColor = '#f5c400';
      if (eff1 === 0 || eff2 === 0) {
        effText = "It had no effect!"; effColor = '#6b6b7e';
      } else if (eff1 === 2.0 && eff2 === 2.0) {
        effText = "🔥 Both super effective!"; effColor = '#ff6b35';
      } else if (eff1 === 2.0) {
        effText = `⚡ ${f1.name}'s move is SUPER EFFECTIVE!`; effColor = '#ff6b35';
      } else if (eff2 === 2.0) {
        effText = `⚡ ${f2.name}'s move is SUPER EFFECTIVE!`; effColor = '#ff6b35';
      } else if (eff1 === 0.5 || eff2 === 0.5) {
        effText = "Not very effective…"; effColor = '#9e9e9e';
      }

      if (effText) showEffectiveness(effText, effColor, 3000);

      // Move announcement
      const m1 = f1.moves[f1.move_used], m2 = f2.moves[f2.move_used];
      setTimeout(() => {
        showAnnouncement(
          `${f1.name} used ${m1.name} (−${f1.damage_dealt}) | ${f2.name} used ${m2.name} (−${f2.damage_dealt})`,
          3500
        );
      }, 400);
      break;
    }

    case 'fight_end': {
      clearInterval(timerInterval);
      $('timer-text').textContent = '—';

      // Greyscale the loser's portrait
      if (msg.winner === msg.fighter1.name) {
        $('avatar2').classList.add('ko');
      } else if (msg.winner === msg.fighter2.name) {
        $('avatar1').classList.add('ko');
      } else {
        // Draw — grey both
        $('avatar1').classList.add('ko');
        $('avatar2').classList.add('ko');
      }

      const ws = $('winner-splash');
      if (msg.winner) {
        $('winner-name').textContent = msg.winner;
      } else {
        $('winner-name').textContent = 'DRAW';
        ws.querySelector('.ko-text').textContent = 'DRAW!';
        ws.querySelector('.winner-sub').textContent = 'Nobody wins!';
      }
      ws.style.display = 'flex';

      // Return to idle after delay
      setTimeout(() => {
        ws.style.display = 'none';
        showScreen('idle');
        updateIdleQueue([]);
      }, 8000);
      break;
    }
  }
}

showScreen('idle');
connect();
</script>
</body>
</html>
